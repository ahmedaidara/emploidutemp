<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SALDIA · EDT simplifié</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #e8f0fe;
            padding: 10px;
            min-height: 100vh;
        }
        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: white;
            padding: 15px;
            border-radius: 40px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .menu button {
            background: #dde5f0;
            border: none;
            padding: 12px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            color: #113355;
            flex: 1 0 auto;
            cursor: pointer;
        }
        .menu button.actif {
            background: #113355;
            color: white;
        }
        .page {
            display: none;
            background: white;
            border-radius: 35px;
            padding: 25px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 700px;
            margin: 0 auto;
        }
        .page.visible {
            display: block;
        }
        h2 {
            color: #113355;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 700;
            border-left: 8px solid #ffaa33;
            padding-left: 18px;
        }
        label {
            font-weight: 600;
            color: #224466;
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #ccddee;
            border-radius: 30px;
            font-size: 16px;
            background: #f9fcff;
            margin-bottom: 10px;
        }
        .btn {
            background: #113355;
            color: white;
            border: none;
            padding: 16px 25px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 17px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }
        .btn.secondaire {
            background: #ffaa33;
            color: #113355;
        }
        .carte {
            background: #f0f5fd;
            border-radius: 25px;
            padding: 20px;
            margin: 20px 0;
        }
        .grille {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }
        .tuile {
            background: white;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            border: 2px solid #ccddee;
        }
        .checkbox-grille {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .checkbox-grille label {
            background: white;
            border-radius: 30px;
            padding: 12px;
            text-align: center;
            border: 2px solid #ccddee;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="menu">
    <button class="actif" data-page="classes">📚 Classes</button>
    <button data-page="profs">👤 Profs</button>
    <button data-page="horaires">📊 Horaires</button>
    <button data-page="dispos">⏰ Dispos</button>
    <button data-page="generer">✨ Générer</button>
    <button data-page="prof">🔐 Prof</button>
</div>

<!-- PAGE CLASSES -->
<div id="page-classes" class="page visible">
    <h2>Créer les classes</h2>
    <div class="carte">
        <label>🏛 Collège (6e à 3e)</label>
        <div id="liste-college" class="grille"></div>
        <div style="display: flex; gap: 8px; margin: 15px 0;">
            <select id="niveau-college">
                <option>6eme</option>
                <option>5eme</option>
                <option>4eme</option>
                <option>3eme</option>
            </select>
            <input type="text" id="groupe-college" placeholder="M1, M2..." value="M1" style="width: 100px;">
            <button class="btn secondaire" id="ajout-college" style="width: auto;">+</button>
        </div>
    </div>
    <div class="carte">
        <label>🏛 Lycée</label>
        <div id="liste-lycee" class="grille"></div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <select id="niveau-lycee">
                <option>2nde</option>
                <option>1ere</option>
                <option>Term</option>
            </select>
            <select id="filiere-lycee">
                <option>S</option>
                <option>L</option>
                <option>Steg</option>
            </select>
            <input type="text" id="groupe-lycee" placeholder="A, B..." value="A" style="width: 80px;">
            <button class="btn secondaire" id="ajout-lycee" style="width: auto;">+</button>
        </div>
    </div>
    <button class="btn" id="sauver-classes">✅ Sauvegarder classes</button>
</div>

<!-- PAGE PROFS -->
<div id="page-profs" class="page">
    <h2>Ajouter un prof</h2>
    <div class="carte">
        <input type="text" id="nom-prof" placeholder="Nom complet">
        <input type="text" id="mdp-prof" placeholder="Mot de passe">
        <input type="text" id="matiere-prof" placeholder="Matière (ex: Maths)">
        <label>Enseigne en :</label>
        <div style="display: flex; flex-wrap: wrap; gap: 10px;" id="checkbox-niveaux">
            <label><input type="checkbox" value="6eme"> 6eme</label>
            <label><input type="checkbox" value="5eme"> 5eme</label>
            <label><input type="checkbox" value="4eme"> 4eme</label>
            <label><input type="checkbox" value="3eme"> 3eme</label>
            <label><input type="checkbox" value="2nde"> 2nde</label>
            <label><input type="checkbox" value="1ere"> 1ere</label>
            <label><input type="checkbox" value="Term"> Term</label>
        </div>
        <button class="btn" id="ajouter-prof">➕ Ajouter prof</button>
    </div>
    <div id="liste-profs" class="carte"></div>
</div>

<!-- PAGE HORAIRES HEBDOS -->
<div id="page-horaires" class="page">
    <h2>Heures par semaine</h2>
    <div class="carte" id="conteneur-horaires"></div>
    <button class="btn" id="sauver-horaires">💾 Sauver horaires</button>
</div>

<!-- PAGE DISPONIBILITES -->
<div id="page-dispos" class="page">
    <h2>Disponibilités prof</h2>
    <div class="carte">
        <input type="text" id="login-dispo" placeholder="Votre nom">
        <input type="password" id="pass-dispo" placeholder="Mot de passe">
        <button class="btn secondaire" id="connecter-dispo">🔑 Se connecter</button>
    </div>
    <div id="panel-dispo" class="carte" style="display: none;"></div>
</div>

<!-- PAGE GENERER -->
<div id="page-generer" class="page">
    <h2>Générer EDT</h2>
    <div class="carte">
        <label>Choisir une classe</label>
        <select id="choix-classe"></select>
        <label style="margin-top: 20px;"><input type="checkbox" id="ignorer-dispo"> Ignorer dispos profs</label>
        <button class="btn" id="lancer-generation">⚡ Générer</button>
        <div id="resultat-edt" style="margin-top: 30px;"></div>
    </div>
</div>

<!-- PAGE PROF (second site) -->
<div id="page-prof" class="page">
    <h2>Espace professeur</h2>
    <div class="carte">
        <input type="text" id="login-profsite" placeholder="Nom">
        <input type="password" id="pass-profsite" placeholder="Mot de passe">
        <button class="btn" id="connecter-profsite">Connexion</button>
    </div>
    <div id="tableau-profsite" class="carte" style="display: none;"></div>
</div>

<script type="module">
    // Firebase direct
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const config = {
        apiKey: "AIzaSyAmLwdTDiT6XP9iB3aNbSWRdQ6njw3TlLc",
        authDomain: "saldiaemploidutemps.firebaseapp.com",
        projectId: "saldiaemploidutemps",
        storageBucket: "saldiaemploidutemps.firebasestorage.app",
        messagingSenderId: "666378499509",
        appId: "1:666378499509:web:ae26cdaa2d2b0a67d255fc"
    };
    const app = initializeApp(config);
    const db = getFirestore(app);

    // Navigation simple
    document.querySelectorAll('.menu button').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.menu button').forEach(b => b.classList.remove('actif'));
            btn.classList.add('actif');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
            document.getElementById('page-' + btn.dataset.page).classList.add('visible');
        };
    });

    // STOCKAGE LOCAL TEMPORAIRE
    let classes = [];
    let profs = [];
    let horaires = {};

    // ---------- PAGE CLASSES ----------
    function afficherClasses() {
        const collegeDiv = document.getElementById('liste-college');
        const lyceeDiv = document.getElementById('liste-lycee');
        collegeDiv.innerHTML = '';
        lyceeDiv.innerHTML = '';
        classes.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'tuile';
            div.innerHTML = `${c.nom} <span style="color:red; cursor:pointer;" data-idx="${i}">✕</span>`;
            if (c.type === 'college') collegeDiv.appendChild(div);
            else lyceeDiv.appendChild(div);
        });
        document.querySelectorAll('.tuile span').forEach(span => {
            span.onclick = () => {
                classes.splice(span.dataset.idx, 1);
                afficherClasses();
            };
        });
    }

    document.getElementById('ajout-college').onclick = () => {
        const niveau = document.getElementById('niveau-college').value;
        const groupe = document.getElementById('groupe-college').value;
        classes.push({ nom: niveau + ' ' + groupe, type: 'college', niveau, groupe });
        afficherClasses();
    };

    document.getElementById('ajout-lycee').onclick = () => {
        const niveau = document.getElementById('niveau-lycee').value;
        const filiere = document.getElementById('filiere-lycee').value;
        const groupe = document.getElementById('groupe-lycee').value;
        classes.push({ nom: niveau + ' ' + filiere + ' ' + groupe, type: 'lycee', niveau, filiere, groupe });
        afficherClasses();
    };

    document.getElementById('sauver-classes').onclick = async () => {
        await setDoc(doc(db, 'saldia', 'classes'), { liste: classes });
        alert('Classes sauvegardées');
        mettreAJourSelectClasse();
    };

    // ---------- PAGE PROFS ----------
    document.getElementById('ajouter-prof').onclick = async () => {
        const nom = document.getElementById('nom-prof').value;
        const mdp = document.getElementById('mdp-prof').value;
        const matiere = document.getElementById('matiere-prof').value;
        const niveaux = Array.from(document.querySelectorAll('#checkbox-niveaux input:checked')).map(cb => cb.value);
        if (!nom || !mdp) return alert('Nom et mot de passe requis');
        const prof = { nom, mdp, matiere, niveaux };
        await setDoc(doc(db, 'profs', nom), prof);
        alert('Prof ajouté');
        chargerProfs();
    };

    async function chargerProfs() {
        const snapshot = await getDocs(collection(db, 'profs'));
        const div = document.getElementById('liste-profs');
        div.innerHTML = '<h3>Profs enregistrés:</h3>';
        snapshot.forEach(d => {
            const p = d.data();
            div.innerHTML += `<div style="background:#eef4fa; margin:5px; padding:10px; border-radius:20px;">👤 ${p.nom} - ${p.matiere}</div>`;
        });
    }
    chargerProfs();

    // ---------- PAGE HORAIRES ----------
    async function afficherHoraires() {
        const snap = await getDoc(doc(db, 'saldia', 'horaires'));
        horaires = snap.exists() ? snap.data() : {};
        const container = document.getElementById('conteneur-horaires');
        let html = '';
        const niveaux = ['6eme','5eme','4eme','3eme','2nde','1ere','Term'];
        niveaux.forEach(n => {
            html += `<div style="margin-bottom:25px;"><h4>${n}</h4>`;
            html += `<input type="text" id="horaire-${n}" placeholder="Maths:4, Francais:3, ..." value="${horaires[n] || ''}" style="margin-bottom:5px;">`;
            html += '</div>';
        });
        container.innerHTML = html;
    }
    afficherHoraires();

    document.getElementById('sauver-horaires').onclick = async () => {
        const niveaux = ['6eme','5eme','4eme','3eme','2nde','1ere','Term'];
        const nouveaux = {};
        niveaux.forEach(n => {
            const val = document.getElementById(`horaire-${n}`).value;
            if (val) nouveaux[n] = val;
        });
        await setDoc(doc(db, 'saldia', 'horaires'), nouveaux);
        alert('Horaires sauvegardés');
    };

    // ---------- PAGE DISPONIBILITES ----------
    document.getElementById('connecter-dispo').onclick = async () => {
        const login = document.getElementById('login-dispo').value;
        const pass = document.getElementById('pass-dispo').value;
        const snap = await getDoc(doc(db, 'profs', login));
        if (!snap.exists() || snap.data().mdp !== pass) return alert('Mauvais identifiants');
        const prof = snap.data();
        const panel = document.getElementById('panel-dispo');
        panel.style.display = 'block';
        const jours = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
        const creneaux = ['8h-9h','9h-10h','10h-11h','11h-12h','12h-13h','14h-15h','15h-16h','16h-17h'];
        let html = '<h3>Cochez vos dispos</h3>';
        prof.niveaux.forEach(niveau => {
            html += `<h4>${niveau}</h4>`;
            jours.forEach(j => {
                html += `<div><strong>${j}</strong> `;
                creneaux.forEach(c => {
                    html += `<label style="display:inline-block; margin:5px;"><input type="checkbox" class="dispo-case" data-niveau="${niveau}" data-jour="${j}" data-creneau="${c}"> ${c}</label> `;
                });
                html += '</div>';
            });
        });
        html += '<button class="btn" id="enregistrer-dispo">Enregistrer</button>';
        panel.innerHTML = html;
        document.getElementById('enregistrer-dispo').onclick = async () => {
            const dispos = {};
            document.querySelectorAll('.dispo-case:checked').forEach(cb => {
                const niveau = cb.dataset.niveau;
                const jour = cb.dataset.jour;
                const creneau = cb.dataset.creneau;
                if (!dispos[niveau]) dispos[niveau] = {};
                if (!dispos[niveau][jour]) dispos[niveau][jour] = [];
                dispos[niveau][jour].push(creneau);
            });
            await updateDoc(doc(db, 'profs', login), { disponibilites: dispos });
            alert('Dispos enregistrées');
        };
    };

    // ---------- PAGE GENERER ----------
    async function mettreAJourSelectClasse() {
        const snap = await getDoc(doc(db, 'saldia', 'classes'));
        if (snap.exists()) classes = snap.data().liste || [];
        const select = document.getElementById('choix-classe');
        select.innerHTML = classes.map(c => `<option>${c.nom}</option>`).join('');
    }
    mettreAJourSelectClasse();

    document.getElementById('lancer-generation').onclick = () => {
        const classe = document.getElementById('choix-classe').value;
        const ignore = document.getElementById('ignorer-dispo').checked;
        document.getElementById('resultat-edt').innerHTML = `
            <div style="background:#eef7e6; border-radius:25px; padding:20px;">
                <h4>📅 Emploi du temps pour ${classe}</h4>
                <p>Lundi: 8h-10h Maths | 10h-12h Français</p>
                <p>Mardi: 9h-12h HG | 14h-16h Anglais</p>
                <p>Mercredi: 8h-12h SVT</p>
                <p>Jeudi: 10h-12h EPS | 14h-17h Physique</p>
                <p>Vendredi: 8h-11h Philosophie</p>
                <p><small>⏱ Génération automatique (simulation)</small></p>
            </div>
        `;
    };

    // ---------- PAGE PROF (second site) ----------
    document.getElementById('connecter-profsite').onclick = async () => {
        const login = document.getElementById('login-profsite').value;
        const pass = document.getElementById('pass-profsite').value;
        const snap = await getDoc(doc(db, 'profs', login));
        if (!snap.exists() || snap.data().mdp !== pass) return alert('Erreur');
        const data = snap.data();
        const tableau = document.getElementById('tableau-profsite');
        tableau.style.display = 'block';
        tableau.innerHTML = `
            <h3>Bienvenue ${data.nom}</h3>
            <p>📚 ${data.matiere}</p>
            <p>👥 Classes: ${data.niveaux?.join(', ')}</p>
            <p>✅ Vos dispos: ${JSON.stringify(data.disponibilites || {})}</p>
            <button class="btn secondaire" id="aller-dispo">Modifier mes dispos</button>
        `;
        document.getElementById('aller-dispo').onclick = () => {
            document.querySelector('[data-page="dispos"]').click();
            document.getElementById('login-dispo').value = login;
            document.getElementById('pass-dispo').value = pass;
            document.getElementById('connecter-dispo').click();
        };
    };

    // Charger classes au démarrage
    (async () => {
        const snap = await getDoc(doc(db, 'saldia', 'classes'));
        if (snap.exists()) {
            classes = snap.data().liste || [];
            afficherClasses();
        }
    })();
</script>
</body>
</html>
